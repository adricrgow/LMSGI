  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const params = new URLSearchParams(window.location.search);
      const isbn = params.get("isbn");

      fetch("/Data/libros.json")
        .then(response => response.json())
        .then(libros => {
          const libro = libros.find(l => l.isbn === isbn);
          if (!libro) return;

          document.getElementById("imagen").src = libro.imagen;
          document.getElementById("nombre").textContent = libro.nombre;
          document.getElementById("autor").textContent = "Autor: " + libro.autor;
          document.getElementById("precio").textContent = libro.precio.toFixed(2) + " €";
          document.getElementById("descripcion").textContent = libro.descripcion;
          document.getElementById("categoria").textContent = "Categoría: " + libro.categoria;
          document.getElementById("nivel").textContent = "Nivel: " + libro.nivel;
          document.getElementById("stock").textContent = "Stock: " + libro.stock;
        })
    });
  </script>
